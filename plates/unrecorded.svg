<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="An empty plate frame awaiting a specimen's field sketch.">
  <rect width="1200" height="900" fill="#f7f2e5"/>
  <rect x="28" y="28" width="1144" height="844" fill="none" stroke="#3b352c" stroke-width="3"/>
  <rect x="44" y="44" width="1112" height="812" fill="none" stroke="#3b352c" stroke-width="1"/>
  <rect x="140" y="140" width="920" height="540" fill="none" stroke="#3b352c" stroke-width="1.6" stroke-dasharray="10 12" opacity=".6"/>
  <text x="600" y="400" font-family="Georgia,serif" font-size="34" font-style="italic" fill="#3b352c" text-anchor="middle" opacity=".8">not yet sketched</text>
  <text x="600" y="448" font-family="Georgia,serif" font-size="22" fill="#3b352c" text-anchor="middle" opacity=".65">this specimen awaits its plate — a screenshot or a field sketch will do</text>
  <text x="600" y="760" font-family="Georgia,serif" font-size="30" text-anchor="middle" letter-spacing="4" fill="#3b352c">PL. — SPECIMEN UNRECORDED</text>
</svg>
